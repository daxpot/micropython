dependencies:
  espressif/mdns: "~1.1.0"
  espressif/tinyusb:
    rules:
      - if: "target in [esp32s2, esp32s3, esp32p4]"
    # Temporary workaround for https://github.com/hathach/tinyusb/issues/3154
    # Can be removed once fix is released in espressif/tinyusb
    git: https://github.com/micropython/tinyusb-espressif.git
    version: cherrypick/dwc2_zlp_fix
  espressif/esp_hosted:
    rules:
      - if: "target == esp32p4"
    version: "2.7.0"
  espressif/esp_wifi_remote:
    rules:
      - if: "target == esp32p4"
    version: "0.15.2"
  espressif/lan867x:
    version: "~1.0.0"
    rules:
      - if: "target == esp32"
      - if: "idf_version >=5.3"
  waveshare/esp_lcd_jd9365_10_1: 
    rules:
      - if: "target == esp32p4"
    version: "1.0.4"
  # ESP-SR wake word detection (ESP32-S3 and ESP32-P4 only)
  espressif/esp-sr:
    version: "^2.3.0"
    rules:
      - if: "target in [esp32s3, esp32p4]"
  espressif/esp_new_jpeg: "^1.0.0"
  # CSI camera sensor driver (ESP32-P4 MIPI CSI camera support)
  espressif/esp_cam_sensor:
    version: "^1.2.1"
    rules:
      - if: "target == esp32p4"
  espressif/esp32-camera:
    git: https://github.com/cnadler86/esp32-camera.git
  # Opus encoder/decoder via esp-opus-encoder (78/xiaoxia)
  78/esp-opus-encoder: "^2.4.1"
  idf:
    version: ">=5.2.0"
